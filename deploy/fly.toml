# Fly.io one-click template for the Cairn server.
#
# Deploy:
#   fly launch --copy-config --name my-cairn
#   fly secrets set CAIRN_SECRET_KEY="$(openssl rand -base64 48)"
#   fly secrets set CAIRN_HELIX_URL=http://cairn-helix.internal:6969
#   fly deploy
#
# What this template assumes:
# - A HelixDB instance reachable at $CAIRN_HELIX_URL. Easiest is to deploy the
#   same Docker image alongside (see fly.helix.toml) or use Fly's managed Postgres
#   adapter (Cairn supports a `--features` Postgres backend — see ADR-015).
# - A persistent volume for /data (1 GiB is plenty for thousands of memories).
# - TLS is terminated by Fly's edge; the cairn process serves plain HTTP on
#   :7777 inside the VM. That's fine because Fly's internal network is trusted.
# - The Cairn control plane binds to 0.0.0.0 — Fly requires this for ingress.

app = "my-cairn"
primary_region = "iad"

[build]
  image = "ghcr.io/vellixia/cairn:0.5.0"

[env]
  CAIRN_HOST = "0.0.0.0"
  CAIRN_PORT = "7777"
  # CAIRN_HELIX_URL and CAIRN_SECRET_KEY are injected via `fly secrets set`
  # (see the top-of-file instructions). Never commit real secrets.

[[mounts]]
  source = "cairn_data"
  destination = "/data"

[mounts.options]
  size = "1GB"

[[services]]
  protocol = "tcp"
  internal_port = 7777
  auto_stop_machines = false   # Cairn holds WebSocket + SSE streams open
  auto_start_machines = true

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "get"
    path = "/api/health"

# Healthcheck: cairn exposes /api/health (the same one the local docker stack uses).
# Fly needs an http_checks block to mark the VM healthy; without it, requests to
# a freshly-restarted VM hit a cold Cairn process.
