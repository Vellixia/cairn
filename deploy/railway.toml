# Railway one-click template for the Cairn server.
#
# Deploy:
#   1. Create a Railway project from this repo (Railway auto-detects the Dockerfile).
#   2. In the project settings, set the start command override to:
#        ./cairn serve --host 0.0.0.0 --port $PORT --data-dir /data
#      (so Railway's dynamic $PORT is honoured — Dockerfile CMD hardcodes 7777).
#   3. Provision a Railway Volume mounted at /data (1 GB is plenty).
#   4. Provision a Railway Postgres or attach an external HelixDB endpoint:
#        - Variable: CAIRN_HELIX_URL = postgresql://user:pass@host:port/db
#        - Variable: CAIRN_SECRET_KEY = <openssl rand -base64 48>
#   5. Generate a public domain (Settings → Networking → Generate Domain).
#      Railway's edge terminates TLS; cairn serves plain HTTP internally.
#
# Why a custom start command and not just the Dockerfile CMD:
# Railway assigns a random $PORT to each service and rewrites the container's
# listening port expectation. cairn reads CAIRN_PORT, so the override keeps
# both sides in sync.

[build]
  builder = "DOCKERFILE"
  dockerfilePath = "Dockerfile"

[deploy]
  # Restart policy: always — Cairn is a long-running stateful service and any
  # crash should trigger a clean re-deploy, not a stuck container.
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 10

  # Healthcheck hits /api/health. Without it Railway can't tell whether the
  # cairn process is actually listening vs. merely "started".
  healthcheckPath = "/api/health"
  healthcheckTimeout = 30

  # Default replicas: 1. Cairn is stateful (memory + checkpoints live in the
  # volume); horizontal scaling requires the Postgres/HelixDB sharding layer
  # planned for v0.6.x.
  numReplicas = 1
