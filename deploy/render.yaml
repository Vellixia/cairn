# Render one-click template (render.yaml).
#
# Deploy:
#   1. From the Render dashboard, click "New +" → "Blueprint" → point at this repo.
#   2. Render reads render.yaml, provisions the cairn web service + a 1 GB disk
#      volume, and wires env vars.
#   3. Set CAIRN_SECRET_KEY to an `openssl rand -base64 48` value in the dashboard.
#   4. Set CAIRN_HELIX_URL — easiest is to point at the HelixDB image below.
#
# What's here:
# - `cairn`: the HTTP server (uses the public `ghcr.io/vellixia/cairn:0.5.0`
#   image so we don't depend on Render's Docker build pipeline).
# - `cairn-helix`: HelixDB on Render's free tier is NOT recommended (HelixDB
#   needs persistent disk + an S3 endpoint for blob storage). For a real
#   deployment, point CAIRN_HELIX_URL at a managed HelixDB instance (or
#   the Postgres adapter — see ADR-015) instead of running it on Render.
#
# The cairn-helix block is included so a fresh-clone deploy *works*, but the
# comment above makes clear it's a dev path, not a production recommendation.

services:
  - type: web
    name: cairn
    runtime: docker
    image: ghcr.io/vellixia/cairn:0.5.0
    plan: starter
    region: oregon
    disk:
      name: cairn-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: CAIRN_HOST
        value: 0.0.0.0
      - key: CAIRN_PORT
        value: 7777
      # CAIRN_HELIX_URL: render-managed secret. Wire to your managed HelixDB.
      # The cairn-helix block below is a dev-only companion service.
      - key: CAIRN_HELIX_URL
        value: http://cairn-helix:8080
      # CAIRN_SECRET_KEY: render-managed secret. Generate with
      #   openssl rand -base64 48
      - key: CAIRN_SECRET_KEY
        sync: false
      # Plain HTTP inside Render's internal network is fine (Render's edge
      # terminates TLS). Set CAIRN_INSECURE=1 to skip the TLS gate.
      - key: CAIRN_INSECURE
        value: "1"
    healthCheckPath: /api/health
    autoDeploy: true

  # Dev-only HelixDB companion. NOT for production:
  # - Render free + starter plans may evict the container; data loss is possible.
  # - HelixDB writes blobs to S3-compatible storage; you must also provision a
  #   bucket (MinIO or AWS S3) and wire the env vars below.
  # For production, set CAIRN_HELIX_URL to a managed HelixDB URL and delete
  # this block.
  - type: worker
    name: cairn-helix
    runtime: docker
    image: ghcr.io/helixdb/enterprise-dev:latest
    plan: starter
    region: oregon
    envVars:
      - key: S3_BUCKET
        value: helix-db
      - key: S3_REGION
        value: us-east-1
      - key: DB_PATH
        value: db/
      - key: AWS_ENDPOINT
        value: http://minio:9000
      - key: AWS_ALLOW_HTTP
        value: "true"
      # AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY are render-managed secrets
      # pointing at your MinIO/S3 credentials.
