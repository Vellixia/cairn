[workspace]
resolver = "2"
members = [
    "crates/cairn-core",
    "crates/cairn-store",
    "crates/cairn-context",
    "crates/cairn-memory",
    "crates/cairn-guard",
    "crates/cairn-assemble",
    "crates/cairn-shell",
    "crates/cairn-profile",
    "crates/cairn-share",
    "crates/cairn-embed",
    "crates/cairn-api",
    "crates/cairn-mcp",
    "crates/cairn-cli",
]

[workspace.package]
version = "0.2.0"
edition = "2021"
license = "Apache-2.0"
authors = ["Cairn contributors"]
repository = "https://github.com/Vellixia/cairn"
rust-version = "1.80"

[workspace.dependencies]
# internal crates
cairn-core = { path = "crates/cairn-core" }
cairn-store = { path = "crates/cairn-store" }
cairn-context = { path = "crates/cairn-context" }
cairn-memory = { path = "crates/cairn-memory" }
cairn-guard = { path = "crates/cairn-guard" }
cairn-assemble = { path = "crates/cairn-assemble" }
cairn-shell = { path = "crates/cairn-shell" }
cairn-profile = { path = "crates/cairn-profile" }
cairn-share = { path = "crates/cairn-share" }
cairn-embed = { path = "crates/cairn-embed" }
cairn-api = { path = "crates/cairn-api" }
cairn-mcp = { path = "crates/cairn-mcp" }

# shared third-party deps
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
sha2 = "0.10"
hex = "0.4"
uuid = { version = "1", features = ["v4", "serde"] }
directories = "5"
similar = "2"
tokio = { version = "1", features = ["full"] }
axum = "0.7"
tower = "0.5"
tower-http = { version = "0.5", features = ["fs", "cors", "trace"] }
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tempfile = "3"
rust-embed = "8"
ureq = { version = "2", features = ["json"] }
dotenvy = "0.15"
jsonwebtoken = "9"

[profile.release]
opt-level = 3
lto = "thin"
strip = true
