<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cairn">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12181F"/>
      <stop offset="1" stop-color="#0B0F14"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.16" r="0.72">
      <stop offset="0" stop-color="#1C2A38"/>
      <stop offset="1" stop-color="#0B0F14" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ember" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFB36B"/>
      <stop offset="1" stop-color="#FB923C"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- ground shadow -->
  <ellipse cx="256" cy="398" rx="150" ry="26" fill="#000000" opacity="0.30"/>

  <!-- stacked stones (a cairn) -->
  <ellipse cx="256" cy="360" rx="150" ry="46" fill="#6B7689"/>
  <ellipse cx="244" cy="300" rx="120" ry="40" fill="#8A94A6"/>
  <ellipse cx="268" cy="250" rx="92"  ry="34" fill="#AEB8C6"/>

  <!-- ember "trail blaze" cap stone -->
  <ellipse cx="256" cy="204" rx="58" ry="30" fill="url(#ember)"/>
  <ellipse cx="252" cy="197" rx="38" ry="12" fill="#FFFFFF" opacity="0.20"/>
</svg>
