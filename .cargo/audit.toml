# cargo-audit config — ignores must be mirrored here for cargo audit to honor them.
# The authoritative documentation lives in deny.toml [advisories].ignore. Keep both in sync.
#
# Categories of unmaintained are still emitted as informational warnings (we want to see them);
# this file only suppresses the IDs we knowingly accept.
[advisories]
ignore = [
    "RUSTSEC-2024-0436", # paste: unmaintained; transitive via rust-embed 8.x
    "RUSTSEC-2025-0119", # number_prefix: unmaintained; transitive via indicatif / human-panic
    "RUSTSEC-2025-0134", # rustls-pemfile: unmaintained; transitive via axum-server 0.7.x
]
informational_warnings = ["unmaintained"]
severity_threshold = "low"

[database]
fetch = true
stale = false

[output]
deny = ["unmaintained"]
format = "terminal"
quiet = false
show_tree = true

[target]
arch = ["x86_64"]
os = ["linux", "windows"]

[yanked]
enabled = true