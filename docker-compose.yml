# Cairn — self-host the whole stack with one command:  docker compose up -d
#
#   minio        S3-compatible storage that HelixDB persists to (so data survives restarts)
#   minio-init   one-shot: creates the `helix-db` bucket, then exits
#   helix        HelixDB graph + vector datastore — Cairn's backend
#   cairn        the Cairn server + dashboard            ->  http://localhost:7777
#   helix host   the HelixDB query API (direct access)   ->  http://localhost:6969
#
# Configure by copying .env.example to .env (embeddings, ports, credentials). Everything below has
# sensible defaults, so a bare `docker compose up` works out of the box.
name: cairn

services:
  # Startup guard: refuse to bring up the MinIO stack if credentials are missing or still set
  # to the well-known `minioadmin/minioadmin` defaults. Keeps compose from silently booting an
  # insecure server when `.env` is empty.
  minio-guard:
    image: alpine:3.19
    container_name: cairn-minio-guard
    env_file:
      - path: .env
        required: true
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -eu
        : "$${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set in .env (see .env.example)}"
        : "$${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env (see .env.example)}"
        case "$${MINIO_ROOT_USER}" in minioadmin)
          echo "FATAL: MINIO_ROOT_USER is the insecure default 'minioadmin'." >&2
          echo "       Set a strong value in .env (see .env.example)." >&2
          exit 1 ;;
        esac
        case "$${MINIO_ROOT_PASSWORD}" in minioadmin|"")
          echo "FATAL: MINIO_ROOT_PASSWORD is empty or the insecure default 'minioadmin'." >&2
          echo "       Set a strong value in .env (see .env.example)." >&2
          exit 1 ;;
        esac
        echo "minio credentials OK"

  minio:
    image: minio/minio:latest
    container_name: cairn-minio
    command: server /data --console-address ":9001"
    depends_on:
      minio-guard:
        condition: service_completed_successfully
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - helix-minio:/data
    restart: unless-stopped
    # Readiness gate: MinIO must answer its /minio/health/live endpoint before dependents
    # start. Without this, helix and minio-init can race the S3 listener on cold starts.
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  # Create the bucket HelixDB writes to, then exit. Retries until MinIO accepts connections.
  # We pin this on the minio `service_healthy` condition so the bucket always exists before
  # helix tries to read or write against it.
  minio-init:
    image: minio/mc:latest
    container_name: cairn-minio-init
    env_file:
      - path: .env
        required: true
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    # Single-line shell: the `until` block must live entirely in one command string because
    # YAML folded scalars can collapse newlines in a way that breaks the loop's `done` keyword.
    # The retry bound (30) is generous enough to ride out MinIO's cold-start latency.
    command:
      - >-
        i=0;
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" 2>/dev/null; do
          i=$$((i+1));
          if [ $$i -ge 30 ]; then
            echo "minio-init: giving up after 30 attempts" >&2;
            exit 1;
          fi;
          echo "minio-init: waiting for minio (attempt $$i/30)...";
          sleep 1;
        done &&
        mc mb --ignore-existing local/helix-db &&
        echo "helix-db bucket ready"
    restart: "no"

  helix:
    image: ghcr.io/helixdb/enterprise-dev:latest
    container_name: cairn-helix
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      S3_BUCKET: helix-db
      S3_REGION: us-east-1
      DB_PATH: db/
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_ENDPOINT: http://minio:9000
      AWS_ALLOW_HTTP: "true"
    ports:
      - "${HELIX_PORT:-6969}:8080" # host:container — the HelixDB API listens on 8080 inside
    restart: unless-stopped
    # Readiness gate: the HelixDB gateway must be accepting TCP on 8080 before cairn starts.
    # The helix image is minimal — no wget/curl/busybox/nc — so we use the shell's built-in
    # /dev/tcp pseudo-device. Any exit code 0 means the listener is up; non-zero means down.
    # The wider interval + retry window tolerates cold-start cache warm (~1-2s of post-listener work).
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 30s

  # v0.5.0 Sprint 12: proper non-root volume init. Pre-0.5.0 the cairn container ran as
  # root (`user: "0"`) because the Docker image's user (`cairn`, uid 10001) couldn't
  # write into a freshly-mounted anonymous volume — anonymous volumes come up owned
  # by root and there was no init container to chown them. The cairn-init service
  # below does that chown once, then exits. After it succeeds, cairn starts as the
  # non-root `cairn` user. Drop the `cairn-init` block to go back to the old behaviour.
  cairn-init:
    image: alpine:3.19
    container_name: cairn-init
    # Run as root so we can chown /data; exit cleanly once done. restart: "no" so a
    # chown failure doesn't loop forever — the cairn container's own error message
    # will surface the misconfiguration.
    user: "0"
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -eu
        echo "cairn-init: preparing /data for uid 10001 (cairn user)..."
        # Ensure the mount point exists (the volume driver does, but be defensive).
        mkdir -p /data
        # chown recursively. On a 1 GiB volume with a few hundred memories this is
        # sub-second; on a 100 GiB volume it's still faster than running cairn as root.
        chown -R 10001:10001 /data
        # Verify the chown landed so a misconfigured volume driver fails fast.
        if [ "$(stat -c %u /data)" != "10001" ]; then
          echo "cairn-init: FATAL — /data is still owned by uid $(stat -c %u /data)" >&2
          echo "cairn-init: this usually means the volume was mounted with a host bind" >&2
          echo "cairn-init: that overrides anonymous-volume permissions." >&2
          exit 1
        fi
        echo "cairn-init: /data is now owned by uid 10001"
    volumes:
      - cairn-data:/data
    restart: "no"

  # Startup guard for the env-only admin bootstrap. Refuses to bring up the cairn service if
  # CAIRN_ADMIN_USERNAME is empty, CAIRN_ADMIN_PASSWORD is shorter than 8 chars, or the two
  # match each other. To opt out, comment out CAIRN_ADMIN_PASSWORD in .env and the dashboard
  # /setup wizard will mint the admin on first visit.
  cairn-admin-guard:
    image: alpine:3.19
    container_name: cairn-admin-guard
    env_file:
      - path: .env
        required: true
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -eu
        : "$${CAIRN_ADMIN_USERNAME:?CAIRN_ADMIN_USERNAME must be set in .env (see .env.example)}"
        if [ -z "$${CAIRN_ADMIN_PASSWORD:-}" ]; then
          echo "CAIRN_ADMIN_PASSWORD is unset — falling back to /setup wizard on first dashboard visit."
          echo "OK (env-only admin bootstrap skipped)"
          exit 0
        fi
        if [ "$${#CAIRN_ADMIN_PASSWORD}" -lt 8 ]; then
          echo "FATAL: CAIRN_ADMIN_PASSWORD must be at least 8 chars (got $${#CAIRN_ADMIN_PASSWORD})." >&2
          echo "       Edit .env (see .env.example) and restart." >&2
          exit 1
        fi
        if [ "$${CAIRN_ADMIN_USERNAME}" = "$${CAIRN_ADMIN_PASSWORD}" ]; then
          echo "FATAL: CAIRN_ADMIN_USERNAME equals CAIRN_ADMIN_PASSWORD — pick a real password." >&2
          exit 1
        fi
        echo "admin env OK (CAIRN_ADMIN_USERNAME=$${CAIRN_ADMIN_USERNAME}, password length $${#CAIRN_ADMIN_PASSWORD})"

  cairn:
    build:
      context: .
      # Slim default build: no in-process local embeddings (avoids pulling fastembed/ort/aws-lc-sys).
      # Opt back into the heavier image with:  docker build --build-arg CAIRN_FEATURES=embed-local .
      args:
        CAIRN_FEATURES: ""
    image: cairn:dev
    container_name: cairn
    # Non-root user from the Dockerfile (cairn, uid 10001). After cairn-init runs the
    # chown above, the volume is writable by this uid. No more `user: "0"` workaround.
    user: "10001:10001"
    depends_on:
      cairn-init:
        condition: service_completed_successfully
      cairn-admin-guard:
        condition: service_completed_successfully
      helix:
        condition: service_healthy
    environment:
      # Inside the container, bind to all interfaces so Docker's userspace proxy can forward
      # the host port. LAN exposure is controlled by the host-side port binding below
      # (127.0.0.1:7777:7777 keeps it localhost-only on the host).
      CAIRN_HOST: 0.0.0.0
      CAIRN_PORT: "7777"
      # Env-only admin bootstrap (see cairn-admin-guard init service). Comment out
      # CAIRN_ADMIN_PASSWORD in .env to fall back to the dashboard /setup wizard.
      CAIRN_ADMIN_USERNAME: ${CAIRN_ADMIN_USERNAME:-admin}
      CAIRN_ADMIN_PASSWORD: ${CAIRN_ADMIN_PASSWORD:-}
      # Cairn reaches Helix over the compose network on its internal port (8080), not the host map.
      CAIRN_HELIX_URL: http://helix:8080
      # CAIRN_INSECURE=1 is intentional for the local-dev compose stack: the Cairn API is
      # authenticated and must not travel in cleartext over a public network. For production
      # deployments, terminate TLS at a reverse proxy (Caddy/Traefik/nginx) in front of the
      # cairn container, and set CAIRN_TLS_CERT + CAIRN_TLS_KEY on that proxy. See
      # docs/reference/architecture.md for the recommended topology.
      CAIRN_INSECURE: "1"
      # Mount the host project so cairn read/verify/checkpoint tools can access local files.
      CAIRN_WORKSPACE_ROOT: /workspace
    env_file:
      - path: .env
        required: false
    ports:
      # Bind to loopback by default so the cleartext HTTP port is not reachable from the LAN.
      # Override with `-p "0.0.0.0:${CAIRN_PORT:-7777}:7777"` if you intentionally want LAN
      # exposure (and only on a trusted network, with CAIRN_INSECURE=1 acknowledged).
      - "127.0.0.1:${CAIRN_PORT:-7777}:7777"
    volumes:
      - cairn-data:/data
      # Read-only mount of the host project directory for file tools (read/verify/checkpoint).
      - "${CAIRN_WORKSPACE_HOST:-.}:/workspace:ro"
    restart: unless-stopped
    # Readiness gate: the cairn server's own /api/health endpoint. Useful for the CI smoke job
    # and for any sidecar that wants to wait for cairn to be live.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:7777/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

volumes:
  cairn-data:
  helix-minio:
